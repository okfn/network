name: OpenSI-CoSMIC
description: "This project aims to develop a cognitively inspired AI system that embodies trustworthiness and supports reflective reasoning through interactive dialogue. Drawing on insights from cognitive and evolutionary psychology, the system is designed to assist users in completing tasks collaboratively, positioning itself as a decision-support tool rather than a decision-maker. At its core is the CoSMIC framework—Cognitive System for Machine Intelligence Computing—which models the brain’s ability to process diverse information across specialised regions, integrating redundant, unique, and synergistic data to support adaptive decision-making.\r\n\r\nA key challenge addressed by the project is enabling AI systems, particularly large language models (LLMs), to reason over heterogeneous, multimodal data in real time. This capability is essential for deploying AI in complex domains such as healthcare, education, and public services. CoSMIC tackles this by combining LLMs with domain-specific AI tools, using a modular architecture inspired by Mixture-of-Experts (MoE) to route different data types to specialised modules. This enhances both performance and interpretability, allowing the system to evolve through interaction and feedback.\r\n\r\nThe project also prioritises ethical and transparent AI development. Explainable AI components, confidence scores, and traceable logic paths will help mitigate risks of over-reliance or misinterpretation. By grounding the system in human-centred design and cognitive science, the project supports Australia’s strategic goal of leading in responsible AI innovation. Ultimately, CoSMIC aims to deliver a foundational step toward Artificial General Intelligence (AGI) that is not only technically advanced but also socially responsible and inclusive."
