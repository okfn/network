name: P2P Data Commons
description: >-
  P2P Data Commons is a federated data & AI infrastructure stack for community
  sensemaking developed by Arkology Studio. It enables organisations and
  communities to share data and derive knowledge over private and trusted
  networks – enabling trans-local knowledge exchange. The project champions
  technological and data sovereignty, and seeks to equip organisations and
  grass-roots communities with epistemic infrastructure to share and engage
  knowledge while preserving autonomy.
