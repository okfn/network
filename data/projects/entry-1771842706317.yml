name: Montessori Glossary Community Project
description: >-
  The Montessori Glossary Community Project is an open community dedicated to
  knowledge equity, shared authority, and the co-creation of an open-access
  vocabulary of Montessori terms. As a controlled vocabulary of terms used to
  describe Montessori information resources, the glossary aims to serve as a
  companion thesaurus to broad subject term vocabularies. Our mission is to
  improve discovery and access to Montessori resources whilst supporting
  Montessori educator competencies. We envision an international, multilingual
  linked data vocabulary of Montessori terms that enhances access to Montessori
  resources within cultural institutions, community archives, and Montessori
  teacher preparation programs. Leveraging open-source technologies, we endeavor
  to facilitate a participatory process that lifts up the multiplicity of
  diverse perspectives, meanings, and contexts. In the spirit of democratization
  and shared knowledge production, we seek to sustain a living vocabulary that
  is inclusive, culturally-sustaining, and multilingual.
