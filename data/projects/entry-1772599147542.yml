name: Open Data Kerala
description: "Open Data Kerala is a community-driven initiative that promotes the creation, use and sharing of open data related to the state of Kerala, India. The project focuses on collecting, curating, and publishing datasets on topics such as geography, governance, culture, environment, elections, and public infrastructure to make information more accessible to everyone.\r\n\r\nThrough collaborative efforts, the community works with open platforms such as Wikidata, OpenStreetMap, and other open repositories to structure and share data in reusable formats. The initiative also conducts workshops, datathons, and training programs to build capacity among students, researchers, and volunteers to use open data tools for analysis, visualization, and storytelling.\r\n\r\nBy encouraging open collaboration and responsible data sharing, Open Data Kerala aims to strengthen the open knowledge ecosystem in the region and enable citizens, researchers, and developers to use data for innovation, research, and public good."
