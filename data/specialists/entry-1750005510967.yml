reason: >-
  Elio Qoshi is a design strategist focused on accessibility, usability, and
  visual communication for privacy-preserving and open technologies. He leads
  Ura Design, which has supported a wide range of internet freedom and
  open-source projects, including collaborations with Canonical, Mozilla, The
  Tor Project, The Guardian Project, and the Open Technology Fund. His work
  spans UX audits, interface testing, multilingual content strategy, and
  branding systems — always grounded in the needs of users navigating complex
  and often hostile digital environments. Elio’s design practice bridges the gap
  between technical development and lived experience, especially for communities
  facing censorship, displacement, or marginalization. His long-standing
  commitment to open knowledge and digital rights makes him a valuable
  contributor to the Directory.
