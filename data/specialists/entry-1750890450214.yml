  work embodies the principles of open science and open knowledge, with a strong
  focus on advancing open-source technologies in artificial intelligence,
  cybersecurity, and quantum computing. Under his guidance, OpenSI has become a
  hub for innovation, education, and community engagement, promoting
  transparency, collaboration, and accessibility in digital research. His
  commitment to empowering individuals and fostering inclusive, sustainable
  technological development aligns perfectly with the mission of the Open
  Knowledge movement, making his inclusion both relevant and impactful.
