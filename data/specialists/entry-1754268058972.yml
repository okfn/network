reason: "Why Gareth Farry Belongs in the Open Knowledge Network\r\n1. A Decolonial, Cultural‑Creative Vision\r\nGareth guides organisations through systems‑shaking creativity, collaborating with grassroots collectives, international agencies, and city governments. His method centres ecological, spiritual and intercultural wisdom—aligning deeply with the Pluriverse ethos and the foundational values of OKF.\r\n\r\n2. Practical Experience with Blockchain and Human Rights\r\nHe’s teamed with Amnesty International on applying blockchain technology to human rights advocacy—demonstrating open systems and peer‑to‑peer trust in practice, not just theory. Such grounded work adds vital dimension to OKFN’s emphasis on open data infrastructure, transparency and decentralised systems.\r\n\r\n3. Embodies the Ethos of Radical Openness\r\nGareth’s philosophical stance—question everything, transact freely without oppressive intermediaries—resonates with the Open Definition and ODbL principles. His belief in shared ownership, distributed power and non‑hierarchical collaboration offers radical impetus to the OKFN mission.\r\n\r\n4. Bridges Legal, Ethical, Spiritual and Technological Domains\r\nHe smoothly weaves law, spiritual insight, ethical tech and creative production into a unified practice. This interdisciplinary approach enriches OKFN’s multidisciplinary network—from policy and academia to activism and engineering."
