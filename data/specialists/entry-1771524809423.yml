reason: "Dr. Lukman Enegi Ismaila embodies the principles of open knowledge through leadership in open science, AI capacity building, and community-driven innovation across health and technology ecosystems. As a neuroimaging and AI Scientist at Johns Hopkins University School of Medicine, he advances reproducible computational research and open, collaborative approaches to biomedical data science.\r\n\r\nHe serves as a mentor with the Sprint AI Training for African Medical Imaging Knowledge Translation (SPARK) program and Co.Lab, supporting the next generation of African medical imaging scientists. As a Lead Machine Learning Engineer and AI Project Manager at Omdena, he has led global, mission-driven AI projects addressing real-world challenges through open collaboration.\r\n\r\nDr. Lukman is the Founder of Haleyouth Foundation, a registered nonprofit in Nigeria dedicated to empowering youth and women through STEM education, menstrual health innovation, climate-smart entrepreneurship, and sustainable economic development. He is also the Founder of the AfriBiobank Project, an initiative building infrastructure for equitable biomedical data access and research representation across Africa.\r\n\r\nHis work bridges open science, AI engineering, public health, and grassroots empowerment, making him a valuable contributor to the Open Knowledge Global Directory and its mission to democratize knowledge for social good."
