reason: "Jinoy Tom Jacob is an active open knowledge practitioner from India who has consistently contributed to the open data and free knowledge ecosystem for several years. As a Wikimedian, OpenStreetMap contributor and open data advocate, he has played a key role in building and supporting communities around open knowledge initiatives such as Wikimedia projects, Open Data Kerala, and various collaborative data and mapping activities.\r\n\r\nHis work spans data curation, open mapping, data visualization and capacity building through workshops and community events. Jinoy has also facilitated training sessions on tools like OpenRefine and has supported contributors in using structured data platforms such as Wikidata and Wikimedia Commons. Through these efforts, he helps make open data more accessible and usable for communities.\r\n\r\nGiven his strong commitment to open knowledge, community collaboration, and practical experience working with open data tools and projects, Jinoy would be a valuable addition to the Open Knowledge Network Directory."
