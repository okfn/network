reason: >-
  Pablo is someone who has been working for digital sovereignty for more than 15
  years through the development and promotion of free software in all fields of
  action. And since #15M (the Occupy movement in Spain), he has been working
  intensively to improve democratic quality through the implementation of dozens
  of initiatives for access to and use of public data to facilitate its
  understanding beyond transparency. The most striking example is Qué Hacen Los
  Diputados (QHLD), a leading parliamentary monitoring platform in Spain that
  has been active for more than 14 years and helps social organizations and
  active citizens learn about the details of what our representatives are doing
  in the state parliament. Pablo is currently the CTO of Political Watch, a
  leading non-profit organization in democratic quality in Spain.
