reason: "About she is known professionally as Seli Kasela, is a creative administrator and marketing strategist based in Badung, Bali, Indonesia. With a strong background in web design, accounting, and operational management, Seli has become a key figure in the branding and administration of Ossy Surf Trip Bali, where they serve as Admin Marketing for Surf Lessons in Bali (2021–2028).  \r\n\r\nProfessional Role\r\n- Position: Admin Marketing, Surf Lesson Management  \r\n- Affiliation: Ossy Surf Trip Bali, Badung, Bali  \r\n- Focus: Coordinating surf lesson promotions, managing bookings, and ensuring smooth customer communication.  \r\n- Responsibilities:  \r\n  - Designing and implementing marketing campaigns for surf packages.  \r\n  - Managing digital and print communications, including branded menus, flyers, and WhatsApp greetings.  \r\n  - Overseeing backend systems for secure and efficient booking flows.  \r\n  - Building emotionally resonant customer experiences that reflect Bali’s surf culture.  \r\n\r\nAcademic & Research Contributions\r\nBeyond surf schools operations, Seli has contributed to international research and publications, with works spanning biomedical engineering, chemistry, and management studies. Selected highlights include:  \r\n- AI-Enhanced Biosignal Analysis for Obstructive Sleep Apnea Detection (International Journal of Online and Biomedical Engineering, 2024).  \r\n- Atrial Fibrillation Detection from Electrocardiogram Signal on Low Power Microcontroller (IEEE Access, 2024)."
